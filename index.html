<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP AR Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #333; margin-bottom: 30px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card h3 { margin: 10px 0; color: #444; text-transform: capitalize; }
        
        /* Model Display settings */
        model-viewer {
            width: 100%;
            height: 250px;
            background-color: #f1f1f1;
            border-radius: 10px;
            --poster-color: transparent;
        }

        /* AR Button style */
        .ar-button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            width: 80%;
            transition: 0.3s;
        }
        .ar-button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Dish Menu (AR View)</h1>

    <div class="menu-grid">
        <div class="card">
            <h3>Dish 1: Donut</h3>
            <model-viewer id="m1" src="donut.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate></model-viewer>
            <button class="ar-button" onclick="document.querySelector('#m1').activateAR()">VIEW IN YOUR ROOM</button>
        </div>

        <div class="card">
            <h3>Dish 2: Donut</h3>

            <button class="ar-button" onclick="document.querySelector('#m2').activateAR()">VIEW IN YOUR ROOM</button>
        </div>

</html>
