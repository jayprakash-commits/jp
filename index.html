<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP AR Donut Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        model-viewer { width: 100%; height: 280px; background-color: #fafafa; border-radius: 8px; }
        .ar-button { background-color: #e91e63; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Donut AR Menu</h1>

    <div class="grid">
        <div class="card">
            <h3>Donut 1</h3>
            <model-viewer id="d1" src="donut.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate></model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d1').activateAR()">VIEW IN AR</button>
        </div>

        <div class="card">
            <h3>Donut 2</h3>
            <model-viewer id="d2" src="donut.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate></model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d2').activateAR()">VIEW IN AR</button>
        </div>

        <div class="card">
            <h3>Donut 3</h3>

            <button class="ar-button" onclick="document.querySelector('#d3').activateAR()">VIEW IN AR</button>
        </div>

        <div class="card :">
            <h3>Donut 4</h3>

            <button class="ar-button" onclick="document.querySelector('#d4').activateAR()">VIEW IN AR</button>
        </div>

        <div class="card">
            <h3>Donut 5</h3>

            <button class="ar-button" onclick="document.querySelector('#d5').activateAR()">VIEW IN AR</button>
        </div>

        <div class="card">

            <button class="ar-button" onclick="document.querySelector('#d6').activateAR()">VIEW IN AR</button>
        </div>

        <div class="card">
            <h3>Donut 7</h3>

            <button class="ar-button" onclick="document.querySelector('#d7').activateAR()">VIEW IN AR</button>
        </div>
    </div>

</body>
</html>
