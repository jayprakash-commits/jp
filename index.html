<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Dish in AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Choose a Dish to View on Your table</h1>

  <div class="dish-container">
    <div class="dish-card">
      <h2>donut</h2>
      <model-viewer src="assets/donet.glb"
        ar
        ar-modes="scene-viewer webxr quick-look"
        camera-controls
        alt="Dish 1 in AR"
        ios-src="assets/donut.usdz"
        shadow-intensity="1"
        auto-rotate
        style="height: 300px; width: 100%;">
      </model-viewer>
      <button onclick="document.querySelector('#dish1').activateAR()">View in AR</button>
    </div>

    <div class="dish-card">
      <h2>lamp</h2>
      <model-viewer id="lamp" src="assets/lamp.glb"
        ar
        ar-modes="scene-viewer webxr quick-look"
        camera-controls
        alt="Dish 2 in AR"
        ios-src="assets/lamp.usdz"
        shadow-intensity="1"
        auto-rotate
        style="height: 300px; width: 100%;">
      </model-viewer>
      <button onclick="document.querySelector('#lamp').activateAR()">View in AR</button>
    </div>
  </div>

</body>
</html>
