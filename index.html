<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP AR Donut Menu</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background: #ffffff; text-align: center; font-family: Arial, sans-serif; padding-bottom: 50px; }
        .instructions { padding: 20px; font-size: 16px; font-weight: 700; border-bottom: 2px solid black; margin-bottom: 20px; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        
        /* Model Viewer Settings from your working code */
        model-viewer { 
            width: 100%; 
            height: 300px; 
            background-color: #fafafa; 
        }

        .ar-button { 
            background-color: #000; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-top: 10px; 
            cursor: pointer; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="instructions">
        Drag with two fingers to rotate • Pinch to zoom • Tap "VIEW IN AR" to see in your space
    </div>

    <div class="grid">
        <div class="card">
            <h3>Donut 1</h3>
            <model-viewer id="d1" src="donut.glb" ar ar-modes="scene-viewer webxr quick-look" ar-placement="floor" camera-controls shadow-intensity="1" exposure="1" scale="1 1 1">
            </model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d1').activateAR()">View in AR</button>
        </div>

        <div class="card">
            <h3>Donut 2</h3>
            <model-viewer id="d2" src="donut.glb" ar ar-modes="scene-viewer webxr quick-look" ar-placement="floor" camera-controls shadow-intensity="1" exposure="1" scale="1 1 1">
            </model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d2').activateAR()">View in AR</button>
        </div>

        <div class="card">
            <h3>Donut 3</h3>
            <model-viewer id="d3" src="donut.glb" ar ar-modes="scene-viewer webxr quick-look" ar-placement="floor" camera-controls shadow-intensity="1" exposure="1" scale="1 1 1">
            </model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d3').activateAR()">View in AR</button>
        </div>

        <div class="card">

            </model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d4').activateAR()">View in AR</button>
        </div>

        <div class="card">
            <h3>Donut 5</h3>
            <model-viewer id="d5" src="donut.glb" ar ar-modes="scene-viewer webxr quick-look" ar-placement="floor" camera-controls shadow-intensity="1" exposure="1" scale="1 1 1">
            </model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d5').activateAR()">View in AR</button>
        </div>

        <div class="card">
            <h3>Donut 6</h3>
            <model-viewer id="d6" src="donut.glb" ar ar-modes="scene-viewer webxr quick-look" ar-placement="floor" camera-controls shadow-intensity="1" exposure="1" scale="1 1 1">
            </model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d6').activateAR()">View in AR</button>
        </div>

        <div class="card">
            <h3>Donut 7</h3>
            <model-viewer id="d7" src="donut.glb" ar ar-modes="scene-viewer webxr quick-look" ar-placement="floor" camera-controls shadow-intensity="1" exposure="1" scale="1 1 1">
            </model-viewer>
            <button class="ar-button" onclick="document.querySelector('#d7').activateAR()">View in AR</button>
        </div>
    </div>

</body>
</html>
