<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Menu JP</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; background: #fff; }
        .instructions { padding: 15px; border-bottom: 2px solid #000; font-weight: bold; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { border: 1px solid #ddd; border-radius: 12px; padding: 10px; margin: 10px; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        model-viewer { width: 100%; height: 300px; background-color: #f9f9f9; }
        button { background: #000; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="instructions">Drag to rotate • Pinch to zoom • Tap "VIEW IN AR"</div>

    <div class="grid">
        <div class="card">
            <h3>Donut 1</h3>
            <model-viewer src="./astronaut.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls shadow-intensity="1" exposure="1" loading="eager">
                <div slot="poster" style="display:flex; align-items:center; justify-content:center; height:100%;">Loading Donut...</div>
            </model-viewer>
            <button onclick="this.previousElementSibling.activateAR()">VIEW IN AR</button>
        </div>

        </div>

</body>
</html>
